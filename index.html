<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despacho Jurídico PRO+</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',system-ui;
  background:#0b1120;
  color:#e5e7eb;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:#020617;
}

nav h1{color:#38bdf8}

nav a{
  color:#fff;
  margin-left:15px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
  url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f');
  background-size:cover;
}

.btn{
  padding:12px 25px;
  background:#38bdf8;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* SECCIONES */
section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

h2{
  text-align:center;
  margin-bottom:30px;
  color:#38bdf8;
}

/* SERVICIOS */
.servicios{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:10px;
}

/* CONTACTO + AGENDA */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

form{
  display:flex;
  flex-direction:column;
  gap:10px;
}

input,textarea{
  padding:10px;
  border:none;
  border-radius:5px;
}

/* LISTA CITAS */
.lista{
  background:#111827;
  padding:20px;
  border-radius:10px;
  max-height:300px;
  overflow:auto;
}

.cita{
  background:#1f2937;
  padding:10px;
  margin-bottom:10px;
  border-radius:5px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cita button{
  background:red;
  border:none;
  color:#fff;
  padding:5px 10px;
  cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}
</style>

</head>

<body>

<nav>
  <h1>LEX & ASOCIADOS</h1>
  <div>
    <a href="#servicios">Servicios</a>
    <a href="#contacto">Agendar</a>
  </div>
</nav>

<div class="hero">
  <div>
    <h2>Agenda tu cita legal</h2>
    <p>Atención profesional inmediata</p>
  </div>
</div>

<section id="servicios">
  <h2>Servicios</h2>
  <div class="servicios">
    <div class="card">Derecho Civil</div>
    <div class="card">Derecho Penal</div>
    <div class="card">Derecho Laboral</div>
    <div class="card">Derecho Familiar</div>
  </div>
</section>

<section id="contacto">
  <h2>Agendar Cita</h2>

  <div class="grid">

    <!-- FORM -->
    <form id="formCita">
      <input type="text" id="nombre" placeholder="Nombre" required>
      <input type="date" id="fecha" required>
      <input type="time" id="hora" required>
      <textarea id="asunto" placeholder="Motivo"></textarea>
      <button class="btn">Agendar</button>
    </form>

    <!-- LISTA -->
    <div class="lista" id="listaCitas"></div>

  </div>

</section>

<footer style="text-align:center;padding:20px;background:#020617;">
  📍 ____________________ <br>
  📞 ____________________ <br>
  ✉ ____________________
</footer>

<script>
// Cargar citas
let citas = JSON.parse(localStorage.getItem("citas")) || [];

function mostrarCitas(){
  let lista = document.getElementById("listaCitas");
  lista.innerHTML = "";

  citas.forEach((cita, index)=>{
    lista.innerHTML += `
      <div class="cita">
        <span>
          ${cita.nombre} - ${cita.fecha} ${cita.hora}
        </span>
        <button onclick="eliminar(${index})">X</button>
      </div>
    `;
  });
}

function eliminar(i){
  citas.splice(i,1);
  localStorage.setItem("citas", JSON.stringify(citas));
  mostrarCitas();
}

document.getElementById("formCita").addEventListener("submit", function(e){
  e.preventDefault();

  let cita = {
    nombre: document.getElementById("nombre").value,
    fecha: document.getElementById("fecha").value,
    hora: document.getElementById("hora").value,
    asunto: document.getElementById("asunto").value
  };

  citas.push(cita);
  localStorage.setItem("citas", JSON.stringify(citas));

  this.reset();
  mostrarCitas();
});

// Inicializar
mostrarCitas();
</script>

</body>
</html>
